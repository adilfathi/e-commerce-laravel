version: '3.8'

services:
  # Laravel Application Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecommerzz-app
    container_name: ecommerzz-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
    networks:
      - ecommerzz-network
    # Install PHP dependencies and start the development server
    command: >
      sh -c "composer install && 
             php artisan config:cache &&
             php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - DB_CONNECTION=${DB_CONNECTION}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}



networks:
  ecommerzz-network:
    driver: bridge
