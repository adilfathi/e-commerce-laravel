<!DOCTYPE html>

<head>

    <title>Sign Up</title>

    <link rel="icon" href="Images/Sign Up Icon.jpg">

    <link rel="stylesheet" href="Sign Up.css">

</head>

<body>

    <div class="navbar">

        <div class="nav-logo">

            <img id="logo" src="Images/Logo.jpg" alt="Image Not Available" />

            <p>E-Commerce</p>

        </div>

        <ul class="nav-menu">

            <a href="index.html">

                <li id='link-1'>Home</li>

            </a>

            <a href="Men.html">

                <li id='link-2'>Men</li>

            </a>

            <a href="Women.html">

                <li id='link-3'>Women</li>

            </a>

            <a href="Kids.html">

                <li id='link-4'>Kids</li>

            </a>

        </ul>

        <div class="mode">

            <div id="toggle-btn" onclick="change_mode()">

                <div id="toggle"></div>

            </div>

        </div>

        <div class="nav-login-cart">

            <a href="Login Page.html">

                <button>Log In</button>

            </a>

            <a href="Cart.html">

                <img id='cart-icon' src="Images/Cart Icon.jpg" alt="Image Not Available" />

            </a>

            <div id="cart-count">3</div>

        </div>

    </div>

    <div class='sign-up'>

        <h1>Sign Up</h1>

        <input id="name" type="text" placeholder='Enter Your Full Name' />

        <input id="e-mail" type="email" placeholder='Enter Your E-Mail Address' />

        <input id="number" type="number" placeholder='Enter Your Mobile Number' />

        <input id="password" type="password" placeholder='Enter Your Password' />

        <input id="confirm-password" type="password" placeholder='Enter Your Confirm Password' />

        <button onclick="sign_up()">Sign Up</button>

    </div>

    <div class="footer">

        <div class="footer-logo">

            <img id='logo' src="Images/Logo.jpg" alt="Image Not Available" />

            <p>E-Commerce</p>

        </div>

        <ul class='socials'>

            <li>

                <img src="Images/Instagram Logo.jpg" alt="Image Not Available" />

            </li>

            <li>

                <img src="Images/Facebook Logo.jpg" alt="Image Not Available" />

            </li>

            <li>

                <img src="Images/Twitter Logo.jpg" alt="Image Not Available" />

            </li>

        </ul>

        <hr />

        <p id='copyright'>© <a href="https://hitarthpathak.github.io/" target="_blank">Hitarth Pathak</a></p>

    </div>

</body>

<script src="script.js"></script>

<script>

    let name = document.getElementById("name");
    let e_mail = document.getElementById("e-mail");
    let number = document.getElementById("number");
    let password = document.getElementById("password");
    let confirm_password = document.getElementById("confirm-password");

    function sign_up() {

        if (name.value == "") {

            alert("Please Enter Your Full Name!");

        }

        else if (e_mail.value == "") {

            alert("Please Enter Your E-Mail Address!");

        }

        else if (number.value == "") {

            alert("Please Enter Your Mobile Number!");

        }

        else if (password.value == "") {

            alert("Please Enter Your Password!");

        }

        else if (confirm_password.value == "") {

            alert("Please Enter Your Confirm Password!");

        }

        else if (confirm_password.value !== password.value) {

            alert("Confirm Password Is Not Same As Password!");

        }

        else {

            let users_data = JSON.parse(localStorage.getItem("buyer")) || [];
            let new_user = {
                name: name.value,
                e_mail: e_mail.value,
                number: number.value,
                password: password.value,
                confirm_password: confirm_password.value
            };
            users_data.push(new_user);
            localStorage.setItem("buyer", JSON.stringify(users_data));

            name.value = "";
            e_mail.value = "";
            e_mail.value = "";
            number.value = "";
            password.value = "";
            confirm_password.value = "";

            alert("You Are Now Registered! Please Log In!");

            document.location = "Login Page.html";

        }

    };

</script>

</html>
