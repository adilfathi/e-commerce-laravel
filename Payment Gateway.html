<!DOCTYPE html>

<head>

    <title>Payment Gateway</title>

    <link rel="icon" href="Images/QR Code.jpg">

</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        width: 100vw;
    }

    .qr-code {
        height: 100%;
        width: 100%;
        display: flex;
        align-items: start;
        justify-content: center;
        padding-top: 10vh;
        background-color: rgba(250, 200, 200, 0.400);
    }

    .qr-code img {
        height: auto;
        width: auto;
    }
</style>

<body>

    <div class="qr-code">

        <img src="Images/QR Code.jpg" alt="Image Not Available">

    </div>

</body>

</html>
