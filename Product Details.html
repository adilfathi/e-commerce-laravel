<!DOCTYPE html>

<head>

    <title>Product Details</title>

    <link rel="icon" href="Images/Product Details Icon.jpg">

    <link rel="stylesheet" href="Product Details.css">

</head>

<body>

    <div class="navbar">

        <div class="nav-logo">

            <img id="logo" src="Images/Logo.jpg" alt="Image Not Available" />

            <p>E-Commerce</p>

        </div>

        <ul class="nav-menu">

            <a href="index.html">

                <li id='link-1'>Home</li>

            </a>

            <a href="Men.html">

                <li id='link-2'>Men</li>

            </a>

            <a href="Women.html">

                <li id='link-3'>Women</li>

            </a>

            <a href="Kids.html">

                <li id='link-4'>Kids</li>

            </a>

        </ul>

        <div class="mode">

            <div id="toggle-btn" onclick="change_mode()">

                <div id="toggle"></div>

            </div>

        </div>

        <div class="nav-login-cart">

            <a href="Login Page.html">

                <button>Log In</button>

            </a>

            <a href="Cart.html">

                <img id='cart-icon' src="Images/Cart Icon.jpg" alt="Image Not Available" />

            </a>

            <div id="cart-count"></div>

        </div>

    </div>

    <div class='product-details'>

        <h1>Product Details</h1>

        <hr />

        <div class="product">

            <div class="product-left">

                <div class="side-images">

                    <img id="side_image-1" src="" alt="Image Not Available" onclick="change_image(src)" />

                    <img id="side_image-2" src="" alt="Image Not Available" onclick="change_image(src)" />

                    <img id="side_image-3" src="" alt="Image Not Available" onclick="change_image(src)" />

                    <img id="side_image-4" src="" alt="Image Not Available" onclick="change_image(src)" />

                    <img id="side_image-5" src="" alt="Image Not Available" onclick="change_image(src)" />

                </div>

                <div class="main-image">

                    <img id="main-image" src="" alt="Image Not Available" />

                </div>

            </div>

            <div class="product-right">

                <table>

                    <tbody>

                        <tr>

                            <th>Product Name</th>

                            <td id="product-name"></td>

                        </tr>

                        <tr>

                            <th>Product Description</th>

                            <td id="product-description"></td>

                        </tr>

                        <tr>

                            <th>Seller Name</th>

                            <td id="seller-name"></td>

                        </tr>

                        <tr>

                            <th>Price</th>

                            <td id="price">

                                <div id='new-price'></div>

                                <div id='old-price'></div>

                            </td>

                        </tr>

                        <tr>

                            <th>Ratings</th>

                            <td>

                                <img src="Images/Start_Icon.jpg" alt="Image Not Available" />

                                <img src="Images/Start_Icon.jpg" alt="Image Not Available" />

                                <img src="Images/Start_Icon.jpg" alt="Image Not Available" />

                                <img src="Images/Start_Icon.jpg" alt="Image Not Available" />

                                <img src="Images/Start_Icon.jpg" alt="Image Not Available" />

                            </td>

                        </tr>

                        <tr>

                            <th>Quantity</th>

                            <td>

                                <div class="counter-box">

                                    <button id='increase' onclick="increase()">

                                        <img src="Images/Upper Arrow.jpg" alt="Image Not Available" />

                                    </button>

                                    <input id="quantity" type="number" readonly />

                                    <button id='decrease' onclick="decrease()">

                                        <img src="Images/Lower Arrow.jpg" alt="Image Not Available" />

                                    </button>

                                </div>

                            </td>

                        </tr>

                    </tbody>

                </table>

                <button id="add-to-cart-button" onclick="add_to_cart()">Add To Cart</button>

            </div>

        </div>

    </div>

    <div class="footer">

        <div class="footer-logo">

            <img id='logo' src="Images/Logo.jpg" alt="Image Not Available" />

            <p>E-Commerce</p>

        </div>

        <ul class='socials'>

            <li>

                <img src="Images/Instagram Logo.jpg" alt="Image Not Available" />

            </li>

            <li>

                <img src="Images/Facebook Logo.jpg" alt="Image Not Available" />

            </li>

            <li>

                <img src="Images/Twitter Logo.jpg" alt="Image Not Available" />

            </li>

        </ul>

        <hr />

        <p id='copyright'>© <a href="https://hitarthpathak.github.io/" target="_blank">Hitarth Pathak</a></p>

    </div>

</body>

<script src="script.js"></script>

<script src="Product_Details.js"></script>

</html>
